<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Builder | Personal Portfolio</title>
    <style>
        /* --- CSS STYLING --- */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, var(--bg));
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h2 {
            margin: 40px 0 20px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            font-size: 1.5rem;
        }

        /* Control Panel */
        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Dynamic Elements */
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            animation: fadeIn 0.4s ease-out;
        }

        .skill-tag {
            background: #334155;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-level {
            height: 6px;
            width: 50px;
            background: #475569;
            border-radius: 3px;
            overflow: hidden;
        }

        .skill-progress {
            height: 100%;
            background: var(--accent);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            header { height: 30vh; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Creative Portfolio Builder</h1>
        <p style="color: var(--secondary)">Build your professional identity dynamically.</p>
    </header>

    <div class="container">
        <section>
            <h2>Builder Toolkit</h2>
            <div class="controls">
                <button onclick="addSkill()">+ Add Skill</button>
                <button onclick="addProject()">+ Add Project</button>
                <button class="secondary" onclick="clearData()">Reset Portfolio</button>
            </div>
        </section>

        <section id="skills-section">
            <h2>Technical Skills</h2>
            <div id="skills-container" class="skill-list">
                </div>
        </section>

        <section id="projects-section">
            <h2>Featured Projects</h2>
            <div id="projects-container" class="grid">
                </div>
        </section>
    </div>

    <script>
        /* --- JAVASCRIPT FUNCTIONALITY --- */

        // 1. DATA INITIALIZATION (Load from LocalStorage)
        let portfolioData = JSON.parse(localStorage.getItem('myPortfolio')) || {
            skills: [],
            projects: []
        };

        // Initialize display on load
        window.onload = () => {
            renderSkills();
            renderProjects();
        };

        // 2. ADD SKILL LOGIC
        function addSkill() {
            const name = prompt("Enter Skill Name (e.g., JavaScript):");
            if (!name) return;
            
            const level = prompt("Enter Proficiency % (0-100):", "80");
            
            const newSkill = { id: Date.now(), name, level: level || 50 };
            portfolioData.skills.push(newSkill);
            saveAndRefresh();
        }

        // 3. ADD PROJECT LOGIC
        function addProject() {
            const title = prompt("Project Title:");
            if (!title) return;
            
            const desc = prompt("Short Description:");
            const link = prompt("Project Link (URL):", "https://");

            const newProject = { 
                id: Date.now(), 
                title, 
                desc: desc || "A fascinating web exploration.", 
                link 
            };
            
            portfolioData.projects.push(newProject);
            saveAndRefresh();
        }

        // 4. RENDERING FUNCTIONS
        function renderSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = ''; // Clear current
            
            portfolioData.skills.forEach(skill => {
                const div = document.createElement('div');
                div.className = 'skill-tag';
                div.innerHTML = `
                    <span>${skill.name}</span>
                    <div class="skill-level">
                        <div class="skill-progress" style="width: ${skill.level}%"></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';
            
            portfolioData.projects.forEach(proj => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <h3>${proj.title}</h3>
                    <p style="color: var(--secondary); margin: 10px 0;">${proj.desc}</p>
                    <a href="${proj.link}" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">View Project →</a>
                `;
                container.appendChild(div);
            });
        }

        // 5. UTILITIES
        function saveAndRefresh() {
            localStorage.setItem('myPortfolio', JSON.stringify(portfolioData));
            renderSkills();
            renderProjects();
        }

        function clearData() {
            if (confirm("Are you sure you want to clear your portfolio?")) {
                localStorage.removeItem('myPortfolio');
                portfolioData = { skills: [], projects: [] };
                renderSkills();
                renderProjects();
            }
        }
    </script>
</body>
</html>
